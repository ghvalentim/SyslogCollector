<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syslog Admin - CM Oliveira do Hospital</title>
    
    <!-- Favicon SVG Integrado (Escudo de Segurança) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    
    <!-- Meta Tags para modo Desktop App (PWA) -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Log Center">

    <!-- TailwindCSS para um design limpo e moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX para reatividade sem Javascript pesado -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js para os gráficos dinâmicos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans h-screen flex overflow-hidden">

    <!-- Menu Lateral -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex z-20">
        <div class="p-6 flex items-center space-x-3 border-b border-slate-800">
            <i data-lucide="shield-check" class="w-8 h-8 text-blue-400"></i>
            <div>
                <h1 class="text-lg font-bold leading-tight">Log Center</h1>
                <p class="text-xs text-slate-400">Município de O. do Hospital</p>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <!-- Rota Principal (Logs) -->
            <a href="/" class="flex items-center space-x-3 px-4 py-3 bg-blue-600 text-white rounded-lg transition-colors cursor-pointer">
                <i data-lucide="activity" class="w-5 h-5"></i>
                <span class="font-medium">Tempo Real</span>
            </a>
            <!-- Estatísticas (HTMX) -->
            <a href="#" hx-get="/stats/view" hx-target="#main-content" class="flex items-center space-x-3 px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors cursor-pointer">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                <span class="font-medium">Estatísticas</span>
            </a>
            <!-- NOVO: Ferramentas de Sistema (HTMX) -->
            <a href="#" hx-get="/tools/view" hx-target="#main-content" class="flex items-center space-x-3 px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors cursor-pointer">
                <i data-lucide="wrench" class="w-5 h-5"></i>
                <span class="font-medium">Ferramentas</span>
            </a>
            <!-- Definições (HTMX) -->
            <a href="#" hx-get="/settings/view" hx-target="#main-content" class="flex items-center space-x-3 px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors cursor-pointer">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="font-medium">Definições</span>
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800 space-y-4">
            <a href="/logout" class="flex items-center space-x-2 text-sm text-slate-400 hover:text-white transition-colors cursor-pointer">
                <i data-lucide="log-out" class="w-4 h-4"></i>
                <span>Terminar Sessão</span>
            </a>
            <div class="flex items-center space-x-2 text-sm text-slate-400">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span>Sistema Online</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        
        <!-- Topbar: AGORA COM FORMULÁRIO DE FILTROS ROBUSTO -->
        <header class="bg-white shadow-sm border-b border-slate-200 p-4 flex justify-between items-center z-10 gap-4">
            
            <!-- Formulário engloba Pesquisa de Texto e Filtro Dropdown -->
            <form id="filter-form" class="flex items-center space-x-3 w-full max-w-2xl" hx-get="/logs" hx-trigger="change from:select, keyup delay:300ms from:input" hx-target="#tabela-logs">
                <div class="flex items-center bg-slate-100 rounded-lg px-3 py-2 w-full border border-slate-200 focus-within:ring-2 focus-within:ring-blue-500 transition-all">
                    <i data-lucide="search" class="w-5 h-5 text-slate-400 mr-2"></i>
                    <input type="search" name="q" placeholder="Pesquisar IP, host, app ou erro..." class="bg-transparent border-none outline-none w-full text-sm text-slate-700 placeholder-slate-400">
                </div>
                <!-- Dropdown de Filtro de Gravidade -->
                <select name="sev" class="bg-slate-100 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 outline-none cursor-pointer hover:bg-slate-200 transition-colors">
                    <option value="">Todas as Gravidades</option>
                    <option value="Emergência">Emergência</option>
                    <option value="Alerta">Alerta</option>
                    <option value="Crítico">Crítico</option>
                    <option value="Erro">Erro</option>
                    <option value="Aviso">Aviso</option>
                    <option value="Notice">Notice</option>
                    <option value="Info">Info</option>
                    <option value="Debug">Debug</option>
                </select>
            </form>

            <div class="flex items-center space-x-3 shrink-0">
                <button onclick="exportarCSV()" class="flex items-center space-x-2 px-4 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg hover:bg-emerald-100 transition-colors text-sm font-medium">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <span>Exportar CSV</span>
                </button>
                <button onclick="toggleAutoRefresh()" id="btn-refresh" class="flex items-center space-x-2 px-4 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-lg hover:bg-blue-100 transition-colors text-sm font-medium shadow-sm">
                    <i data-lucide="pause-circle" id="icon-refresh" class="w-4 h-4"></i>
                    <span id="text-refresh">Pausar Live</span>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-6 bg-slate-50" id="main-content">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="min-w-full divide-y divide-slate-200 table-fixed w-full">
                    <thead class="bg-slate-50 sticky top-0 z-10 shadow-sm">
                        <tr>
                            <th class="w-16 px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">ID</th>
                            <th class="w-40 px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Data / Hora</th>
                            <th class="w-32 px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Rede / IP</th>
                            <th class="w-48 px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Host / App</th>
                            <th class="w-28 px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Gravidade</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Mensagem</th>
                        </tr>
                    </thead>
                    <!-- O hx-include recolhe todo o conteúdo do formulário (Texto E o Dropdown) a cada refresh automático -->
                    <tbody id="tabela-logs" class="bg-white divide-y divide-slate-200" hx-get="/logs" hx-trigger="every 2s" hx-include="#filter-form">
                        <tr>
                            <td colspan="6" class="text-center py-12 text-slate-500 animate-pulse">
                                <i data-lucide="loader-2" class="w-8 h-8 mx-auto animate-spin text-blue-500 mb-3"></i>
                                A carregar os registos do sistema...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Drawer de Detalhes e Fundo Escuro -->
    <div id="drawer-backdrop" class="fixed inset-0 bg-slate-900/40 z-40 hidden transition-opacity opacity-0 backdrop-blur-sm" onclick="closeLogDetails()"></div>

    <div id="log-drawer" class="fixed top-0 right-0 z-50 h-screen p-6 overflow-y-auto transition-transform translate-x-full bg-white w-full max-w-md shadow-2xl border-l border-slate-200 duration-300">
        <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
            <h5 class="text-lg font-bold text-slate-800 flex items-center">
                <i data-lucide="file-text" class="w-5 h-5 mr-2 text-blue-600"></i> Detalhes do Registo
            </h5>
            <button type="button" onclick="closeLogDetails()" class="text-slate-400 bg-slate-50 hover:bg-slate-200 hover:text-slate-900 rounded-lg text-sm w-8 h-8 flex justify-center items-center transition-colors">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
        
        <div class="space-y-5">
            <div><label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">ID / Data e Hora</label><div class="text-sm font-medium text-slate-900"><span id="detail-id" class="text-slate-500 mr-2"></span><span id="detail-ts"></span></div></div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Origem (IP)</label><div class="text-sm font-mono text-slate-800 bg-slate-50 px-3 py-2 rounded-md border border-slate-200" id="detail-ip"></div></div>
                <div><label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Protocolo</label><div class="text-sm font-mono text-slate-800 bg-slate-50 px-3 py-2 rounded-md border border-slate-200" id="detail-proto"></div></div>
            </div>
            <div><label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Host / Servidor</label><div class="text-sm font-medium text-slate-800" id="detail-host"></div></div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Aplicação & Facility</label>
                <div class="text-sm font-medium text-slate-800 flex items-center"><span id="detail-app"></span> <span class="text-slate-500 text-xs ml-2 bg-slate-100 px-2 py-0.5 rounded border border-slate-200" id="detail-fac"></span></div>
            </div>
            <div><label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Gravidade</label><div><span id="detail-sev" class="px-2.5 py-1 text-xs uppercase tracking-wider font-bold rounded-md border bg-slate-100 text-slate-800"></span></div></div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center justify-between">
                    <span>Mensagem Completa</span>
                    <button onclick="copiarPayload()" class="text-blue-500 hover:text-blue-700 flex items-center font-semibold uppercase tracking-wider transition-colors"><i data-lucide="copy" class="w-3 h-3 mr-1"></i> Copiar</button>
                </label>
                <div class="p-4 bg-slate-900 text-green-400 font-mono text-xs rounded-xl border border-slate-700 overflow-x-auto whitespace-pre-wrap leading-relaxed shadow-inner" id="detail-payload" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
