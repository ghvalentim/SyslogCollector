<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syslog Admin - CM Oliveira do Hospital</title>
    
    <!-- Favicon SVG Integrado (Escudo de Segurança) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    
    <!-- Meta Tags para modo Desktop App (PWA) -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Log Center">

    <!-- CSS Compilado Localmente (Tailwind via CLI) -->
    <link rel="stylesheet" href="/output.css">

    <!-- Bibliotecas Externas (HTMX, Lucide, Chart.js) -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="layout-body">

    <!-- Menu Lateral -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <i data-lucide="shield-check" class="w-8 h-8 text-blue-400"></i>
            <div>
                <h1 class="text-lg font-bold leading-tight">Log Center</h1>
                <p class="text-xs text-slate-400">Município de O. do Hospital</p>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item active">
                <i data-lucide="activity" class="w-5 h-5"></i> 
                <span class="font-medium">Tempo Real</span>
            </a>
            <a href="#" hx-get="/stats/view" hx-target="#main-content" class="nav-item">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i> 
                <span class="font-medium">Estatísticas</span>
            </a>
            <!-- NOVO MENU DE ALERTAS -->
            <a href="#" hx-get="/alerts/view" hx-target="#main-content" class="nav-item">
                <i data-lucide="bell" class="w-5 h-5"></i> 
                <span class="font-medium">Motor de Alertas</span>
            </a>
            <a href="#" hx-get="/policies/view" hx-target="#main-content" class="nav-item">
                <i data-lucide="shield" class="w-5 h-5"></i> 
                <span class="font-medium">Políticas de Logs</span>
            </a>
            <a href="#" hx-get="/tools/view" hx-target="#main-content" class="nav-item">
                <i data-lucide="wrench" class="w-5 h-5"></i> 
                <span class="font-medium">Ferramentas</span>
            </a>
            <a href="#" hx-get="/settings/view" hx-target="#main-content" class="nav-item">
                <i data-lucide="settings" class="w-5 h-5"></i> 
                <span class="font-medium">Definições</span>
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800 space-y-4">
            <a href="/logout" class="nav-item hover:bg-transparent px-0 py-0 text-sm hover:text-white">
                <i data-lucide="log-out" class="w-4 h-4"></i> 
                <span>Terminar Sessão</span>
            </a>
            <div class="flex items-center space-x-2 text-sm text-slate-400">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span>Plataforma Ativa</span>
            </div>
        </div>
    </aside>

    <main class="main-container">
        
        <!-- Topbar com Filtros (Agora com Fonte/Origem!) -->
        <header class="topbar">
            <form id="filter-form" class="flex items-center space-x-3 w-full max-w-3xl" hx-get="/logs" hx-trigger="change from:select, keyup delay:300ms from:input" hx-target="#tabela-logs">
                <div class="search-container">
                    <i data-lucide="search" class="w-5 h-5 text-slate-400 mr-2"></i>
                    <input type="search" name="q" placeholder="Pesquisar IP, host, app ou erro..." class="search-input">
                </div>
                
                <!-- Filtro de Origem (NOVO!) -->
                <select name="source" class="form-input w-auto cursor-pointer hover:bg-slate-200 transition-colors">
                    <option value="">Todas as Origens</option>
                    <option value="Firewall">Firewall</option>
                    <option value="Windows">Windows</option>
                    <option value="Linux">Linux</option>
                    <option value="Web">Web</option>
                    <option value="Network">Network</option>
                    <option value="DNS">DNS</option>
                    <option value="DHCP">DHCP</option>
                </select>

                <!-- Filtro de Gravidade -->
                <select name="sev" class="form-input w-auto cursor-pointer hover:bg-slate-200 transition-colors">
                    <option value="">Todas as Gravidades</option>
                    <option value="Emergência">Emergência</option>
                    <option value="Alerta">Alerta</option>
                    <option value="Crítico">Crítico</option>
                    <option value="Erro">Erro</option>
                    <option value="Aviso">Aviso</option>
                    <option value="Notice">Notice</option>
                    <option value="Info">Info</option>
                    <option value="Debug">Debug</option>
                </select>
            </form>

            <div class="flex items-center space-x-3 shrink-0">
                <button onclick="exportarCSV()" class="btn btn-emerald">
                    <i data-lucide="download" class="w-4 h-4"></i> 
                    <span>Exportar</span>
                </button>
                <button onclick="exportarPDF()" class="btn btn-red">
                    <i data-lucide="file-text" class="w-4 h-4"></i> 
                    <span>PDF</span>
                </button>
                <button onclick="toggleAutoRefresh()" id="btn-refresh" class="btn btn-blue">
                    <i data-lucide="pause-circle" id="icon-refresh" class="w-4 h-4"></i> 
                    <span id="text-refresh">Pausar Live</span>
                </button>
            </div>
        </header>

        <!-- Container da Tabela -->
        <div class="main-content" id="main-content">
            <div class="card">
                <table class="min-w-full divide-y divide-slate-200 table-fixed w-full">
                    <thead class="table-head">
                        <tr>
                            <th class="th-cell w-16">ID</th>
                            <th class="th-cell w-40">Data / Hora</th>
                            <th class="th-cell w-32">Rede / IP</th>
                            <th class="th-cell w-48">Host / App</th>
                            <th class="th-cell w-32">Origem</th> <!-- NOVA COLUNA -->
                            <th class="th-cell w-28">Gravidade</th>
                            <th class="th-cell">Mensagem</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-logs" class="bg-white divide-y divide-slate-200" hx-get="/logs" hx-trigger="every 2s" hx-include="#filter-form">
                        <tr>
                            <td colspan="7" class="text-center py-12 text-slate-500 animate-pulse">
                                <i data-lucide="loader-2" class="w-8 h-8 mx-auto animate-spin text-blue-500 mb-3"></i>
                                A carregar os registos do sistema...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Drawer de Detalhes -->
    <div id="drawer-backdrop" class="drawer-backdrop hidden opacity-0" onclick="closeLogDetails()"></div>

    <div id="log-drawer" class="drawer-panel translate-x-full">
        <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
            <h5 class="text-lg font-bold text-slate-800 flex items-center">
                <i data-lucide="file-text" class="w-5 h-5 mr-2 text-blue-600"></i> Detalhes do Registo
            </h5>
            <button type="button" onclick="closeLogDetails()" class="btn-icon">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="drawer-label">ID / Data e Hora</label>
                <div class="text-sm font-medium text-slate-900">
                    <span id="detail-id" class="text-slate-500 mr-2"></span>
                    <span id="detail-ts"></span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="drawer-label">Origem (IP)</label>
                    <div class="form-input font-mono text-slate-800" id="detail-ip"></div>
                </div>
                <div>
                    <label class="drawer-label">Protocolo</label>
                    <div class="form-input font-mono text-slate-800" id="detail-proto"></div>
                </div>
            </div>
            <div>
                <label class="drawer-label">Host / Servidor</label>
                <div class="text-sm font-medium text-slate-800" id="detail-host"></div>
            </div>
            
            <!-- EXIBIÇÃO CLASSIFICADA -->
            <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                <label class="drawer-label text-slate-500">Classificação / Aplicação & Facility</label>
                <div class="text-sm font-medium text-slate-800 flex items-center mt-1 flex-wrap gap-2">
                    <span id="detail-source" class="px-2 py-0.5 bg-indigo-100 text-indigo-800 rounded border border-indigo-200 text-xs font-bold"></span>
                    <span id="detail-app" class="font-bold text-slate-700"></span> 
                    <span id="detail-facname" class="text-slate-500 text-xs font-semibold px-2 py-0.5 bg-white border border-slate-200 rounded"></span>
                    <span id="detail-fac" class="hidden"></span>
                </div>
            </div>
            
            <div>
                <label class="drawer-label">Gravidade</label>
                <div><span id="detail-sev" class="badge"></span></div>
            </div>
            <div>
                <label class="drawer-label flex justify-between">
                    <span>Mensagem Completa</span>
                    <button onclick="copiarPayload()" class="text-blue-500 hover:text-blue-700 flex items-center transition-colors">
                        <i data-lucide="copy" class="w-3 h-3 mr-1"></i> Copiar
                    </button>
                </label>
                <div class="terminal-box" id="detail-payload" style="max-height: 400px;"></div>
            </div>
        </div>
    </div>

    <!-- Referência ao Ficheiro JS Externo -->
    <script src="/script.js"></script>
    
    <script>
        // Lógica visual para realçar o item ativo no menu lateral
        document.addEventListener('click', function(e) {
            if (e.target.closest('.nav-item')) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                e.target.closest('.nav-item').classList.add('active');
            }
        });
    </script>
</body>
</html>
