<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Login - Log Center</title>
    <link rel="stylesheet" href="/output.css">
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen relative">
    <div class="card p-10 max-w-sm w-full z-10 shadow-2xl">
        <h2 class="text-2xl font-bold text-center mb-6">Acesso Reservado</h2>
        {{if .Error}}
        <div class="bg-red-50 text-red-600 text-sm p-3 rounded-lg text-center mb-4 border border-red-200">
            {{.Error}}
        </div>
        {{end}}
        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="form-label">Utilizador</label>
                <input type="text" name="username" class="form-input" required autofocus>
            </div>
            <div>
                <label class="form-label">Palavra-passe</label>
                <input type="password" name="password" class="form-input" required>
            </div>
            <button type="submit" class="btn-primary w-full mt-2 py-3">Entrar</button>
        </form>
    </div>
</body>
</html>
